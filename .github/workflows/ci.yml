# Continuous integration: runs the full test suite on every push to main and
# on every pull request.
#
# Matrix: Node 18 / 20 / 22 / 24 (everything `engines: >=18` declares, plus
# the next LTS) on ubuntu + windows. Windows is INFORMATIONAL for now
# (continue-on-error): promote it to blocking by deleting that line once it
# has been seen green.
#
# Lint runs in its own job (once, on Node 22): eslint 10 requires Node
# >=20.19, so it cannot run inside the Node 18 leg of the matrix — and
# linting the same code 8 times would be wasted work anyway.
#
# performance.test.js is excluded from the matrix (its timing assertions —
# avg < 50/100/500 ms — are flaky on shared runners) and runs in a separate
# non-blocking job instead. The `nix` job runs the suite with a Nix-store
# provided Node on ubuntu — an approximation of NixOS environments (the
# project explicitly supports DT_UNKNOWN filesystems / buildFHSEnv setups).

name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual trigger (Actions tab / API). Also needed because pushes made by
  # bot/app integrations do not fire push/pull_request workflow events.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  test:
    name: Test (Node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    # Windows is informational until proven green — do not let it block merges yet.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22, 24]
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test (performance tests excluded)
        run: npm run test:ci

  performance:
    name: Performance tests (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Timing assertions on shared runners can flake — never block merges on this job.
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run performance tests
        run: npm run test:performance

  nix:
    name: Nix-provided Node (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Exotic-environment probe (Nix store paths, NixOS-like setups) — informational.
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Test with Nix-store Node
        run: nix-shell -p nodejs_22 --run "npm ci && npm run test:ci"
