# Continuous integration: runs the full test suite (lint included via
# pretest:ci) on every push to main and on every pull request.
#
# Matrix: Node 20 / 22 / 24 (what `engines` declares and the next LTS) on
# ubuntu + windows. Windows is INFORMATIONAL for now (continue-on-error):
# promote it to blocking by deleting that line once it has been seen green.
#
# performance.test.js is excluded from the matrix (its timing assertions —
# avg < 50/100/500 ms — are flaky on shared runners) and runs in a separate
# non-blocking job instead. The `nix` job runs the suite with a Nix-store
# provided Node on ubuntu — an approximation of NixOS environments (the
# project explicitly supports DT_UNKNOWN filesystems / buildFHSEnv setups).

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    # Windows is informational until proven green — do not let it block merges yet.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint + test (performance tests excluded)
        run: npm run test:ci

  performance:
    name: Performance tests (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Timing assertions on shared runners can flake — never block merges on this job.
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run performance tests
        run: npm run test:performance

  nix:
    name: Nix-provided Node (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Exotic-environment probe (Nix store paths, NixOS-like setups) — informational.
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Lint + test with Nix-store Node
        run: nix-shell -p nodejs_22 --run "npm ci && npm run test:ci"
